name: Verify Vercel production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deployment
        shell: bash
        run: sleep 20

      - name: Verify Vercel to Neon connection
        shell: bash
        run: |
          set -euo pipefail

          candidates=(
            'https://dozaks.vercel.app'
            'https://dozaks-diellzarabushaj-2665s-projects.vercel.app'
          )

          base=''
          : > diagnostics.txt
          for candidate in "${candidates[@]}"; do
            echo "Checking $candidate" | tee -a diagnostics.txt
            status="$(curl --silent --show-error --location --max-time 25 \
              --dump-header candidate-headers.txt \
              --output candidate-body.txt \
              --write-out '%{http_code}' \
              "$candidate/api/product-catalog?mode=health" || true)"
            content_type="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/ {value=$0} END{sub(/^[^:]*:[[:space:]]*/, "", value); gsub(/\r/, "", value); print value}' candidate-headers.txt)"
            echo "HTTP $status · Content-Type: ${content_type:-unknown}" | tee -a diagnostics.txt
            cat candidate-headers.txt >> diagnostics.txt || true
            echo '--- body ---' >> diagnostics.txt
            cat candidate-body.txt >> diagnostics.txt || true
            echo -e '\n--- end ---' >> diagnostics.txt

            if [ "$status" = '200' ] && python - <<'PY'
          import json
          try:
              with open('candidate-body.txt', encoding='utf-8') as fh:
                  data = json.load(fh)
              assert data.get('ok') is True
              assert data.get('database') == 'neon'
              assert data.get('hosting') == 'vercel'
          except Exception:
              raise SystemExit(1)
          PY
            then
              base="$candidate"
              cp candidate-body.txt catalog-health.json
              break
            fi
          done

          if [ -z "$base" ]; then
            echo 'No Vercel production domain returned a valid Neon health response.' | tee -a diagnostics.txt
            exit 1
          fi

          echo "Using production domain: $base" | tee -a diagnostics.txt

          request_json() {
            local url="$1"
            local output="$2"
            local status
            status="$(curl --silent --show-error --location --max-time 25 \
              --dump-header "${output}.headers" \
              --output "$output" --write-out '%{http_code}' "$url" || true)"
            {
              echo "URL: $url"
              echo "HTTP: $status"
              cat "${output}.headers" 2>/dev/null || true
              echo '--- body ---'
              cat "$output" 2>/dev/null || true
              echo -e '\n--- end ---'
            } >> diagnostics.txt
            if [ "$status" != '200' ]; then
              return 1
            fi
            python -m json.tool "$output" >/dev/null
          }

          request_json "$base/api/clinical-data?mode=health" clinical-health.json
          request_json "$base/api/product-catalog?q=MERO&limit=5" search.json

          python - <<'PY'
          import json

          with open('catalog-health.json', encoding='utf-8') as fh:
              catalog = json.load(fh)
          with open('clinical-health.json', encoding='utf-8') as fh:
              clinical = json.load(fh)
          with open('search.json', encoding='utf-8') as fh:
              search = json.load(fh)

          assert catalog.get('ok') is True, catalog
          assert catalog.get('database') == 'neon', catalog
          assert catalog.get('hosting') == 'vercel', catalog
          assert int(catalog.get('visible_products') or 0) >= 4000, catalog

          assert clinical.get('ok') is True, clinical
          assert clinical.get('database') == 'neon', clinical
          assert clinical.get('hosting') == 'vercel', clinical

          products = search.get('productResults') or search.get('results') or []
          drugs = search.get('drugResults') or []
          assert products or drugs, search

          print(json.dumps({
              'catalogProducts': catalog.get('visible_products'),
              'catalogDrugs': catalog.get('visible_drugs'),
              'searchProducts': len(products),
              'searchDrugs': len(drugs),
              'firstProduct': products[0].get('trade_name') if products else None,
          }, ensure_ascii=False))
          PY

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vercel-health-diagnostics
          path: |
            diagnostics.txt
            candidate-headers.txt
            candidate-body.txt
            catalog-health.json
            clinical-health.json
            clinical-health.json.headers
            search.json
            search.json.headers
          if-no-files-found: warn
          retention-days: 1
