name: Import official medicinal products from Google Sheet

on:
  pull_request:
    branches:
      - main
    paths:
      - .catalog-import-trigger

permissions:
  contents: read

jobs:
  import-catalogue:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://dozaks_import_sheet_be22da72:MQ4FPsCsl-XkMyWur8F37jOqtvyw9nla@ep-long-union-awru01in-pooler.c-12.us-east-1.aws.neon.tech/neondb?channel_binding=require&sslmode=require
      SHEET_EXPORT_URL: https://docs.google.com/spreadsheets/d/1gA8wXC-EHTtB4Y4ucdk7W69KsrgNMm-G2RGx51oBWTA/export?format=xlsx
      SOURCE_FILE: Regjistri-i-barnave-Final-2025.xlsx

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Download Google Sheet as XLSX
        run: curl -L --retry 4 --retry-all-errors "$SHEET_EXPORT_URL" --output "$SOURCE_FILE"

      - name: Import all products into Neon main
        run: npm run import:catalog -- "$SOURCE_FILE"

      - name: Verify complete catalogue
        run: |
          node --input-type=module <<'NODE'
          import { neon } from '@neondatabase/serverless';
          const sql = neon(process.env.DATABASE_URL);
          const [summary] = await sql`
            SELECT
              count(*)::int AS product_rows,
              count(DISTINCT trade_name)::int AS trade_names,
              count(DISTINCT active_substance_normalized)::int AS active_substances,
              min(source_row_number)::int AS first_source_row,
              max(source_row_number)::int AS last_source_row
            FROM public.product_catalog_entries e
            JOIN public.product_catalog_versions v ON v.id=e.catalog_version_id
            WHERE v.status='active' AND e.import_status='imported'
          `;
          const [batches] = await sql`
            SELECT count(*)::int AS completed_batches
            FROM public.product_catalog_import_batches b
            JOIN public.product_catalog_versions v ON v.id=b.catalog_version_id
            WHERE v.status='active' AND b.status='completed'
          `;
          console.log(JSON.stringify({ ...summary, ...batches }, null, 2));
          if (summary.product_rows !== 4006 || summary.first_source_row !== 3 || summary.last_source_row !== 4008) {
            throw new Error('Catalogue verification failed');
          }
          NODE
