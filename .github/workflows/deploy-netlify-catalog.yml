name: Deploy DozaKS catalogue backend to Netlify

on:
  pull_request:
    branches:
      - main
    paths:
      - .netlify-catalog-deploy-trigger

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4

      - name: Deploy repository to Netlify
        shell: bash
        run: |
          set +e
          npx -y @netlify/mcp@latest \
