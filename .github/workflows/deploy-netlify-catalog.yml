name: Deploy DozaKS catalogue backend to Netlify

on:
  pull_request:
    branches:
      - main
    paths:
      - .netlify-catalog-deploy-trigger

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy repository to Netlify
        shell: bash
        run: |
          set +e
          git clone --quiet --depth 1 --branch main https://github.com/diellzarabushaj-source/DOZAKS.git source
          cd source
          npx -y @netlify/mcp@latest \
            --site-id 8b459b64-b5ff-4352-8a4c-d7203e292149 \
            --proxy-path "https://netlify-mcp.netlify.app//proxy/eyJhbGciOiJkaXIiLCJlbmMiOiJBMjU2R0NNIn0..jPaKkClVEQF8_RnU.ouLk-kETIFPMX1Oi1KU09C_RINl0HNsssLZ7Y0FRh0dFOc9OXww7xeq2EJ8OfZQrveUKLf2uNkYpeo5SnFhwiIok802-xDaFU_980NXTL9tXlVBxG70ZDga_KZT-AI1KlrjRM5y7uFUekzgFWHanvbnQYFYRKiO0hAp4gQArWRdyKzAd3SUsJG5umNMt4Doi6pRJnmtqQYXru6ir37hGHMKI0W9SVw94GN5stXjFHvw15AhuRZZFjNQ1cmOtvToguE5huK-5_2MAcczTmc7O9Vt6dT-xX03Ul3tBEN4K1mKGU20qQpQ4JtC-sfHyiTQw5iU5NxzQ-CjD1u4mJ2GfUlYuWyvRZEqTPi04V_dtUBRpE2VQrhdE5jCFQwjqHHI0iZ-jjQJz.uqeYxT8LwVZgYhfhWhVISA" \
            > netlify-deploy.log 2>&1
          status=$?
          cat netlify-deploy.log
          exit "$status"
