name: Verify live product catalog

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify catalog endpoint
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl --fail --silent --show-error --max-time 20 'https://mjeku-ks.netlify.app/api/product-catalog?q=MERO&limit=5')"
          printf '%s' "$response" > response.json
          python - <<'PY'
          import json
          with open('response.json', encoding='utf-8') as fh:
              data = json.load(fh)
          products = data.get('productResults') or data.get('results') or []
          drugs = data.get('drugResults') or []
          assert products or drugs, data
          print(json.dumps({
              'drugResults': len(drugs),
              'productResults': len(products),
              'firstProduct': products[0].get('trade_name') if products else None,
          }, ensure_ascii=False))
          PY
